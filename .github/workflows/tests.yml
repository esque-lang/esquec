name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: go test (linux/amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - run: go mod download

      # v0.14 made `//` the divide-reduction operator and moved line
      # comments to `#`. Operator uses are conventionally close-packed
      # (`//arr`), so a `//` followed by whitespace is almost always a
      # stale comment. If you actually need `// (expr)` style spacing,
      # restructure to `//(expr)` or use a `let`.
      - name: Reject stale `//` line comments in .esq sources
        run: |
          if grep -rEn '//[ \t]' --include='*.esq' .; then
            echo "::error::Stale `//` line comment found — use `#` (see issue #1)."
            exit 1
          fi

      # Every fixture under tests/e2e/ must declare at least one
      # `# expect ...` directive so the auto-discovery harness in
      # tests/e2e/e2e_test.go has something to assert against
      # (see issue #2). Silent fixtures are how comments in the old
      # Go-side test file drifted out of sync with reality.
      - name: Require expect directives on every tests/e2e fixture
        run: |
          missing=0
          for f in tests/e2e/*.esq; do
            if ! grep -qE '^[[:space:]]*(#|//)[[:space:]]*expect[[:space:]]' "$f"; then
              echo "::error file=$f::missing \`# expect\` directive (see issue #2)"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then exit 1; fi

      - run: go vet ./...

      - run: go build ./...

      - run: go test -race -count=1 ./...
